name: Project Kathani

on:
  schedule:
    - cron: '30 23 * * *' # Runs at 5:00 AM IST every day
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  Generate-And-Send:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for saving the new .md files back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Kathani Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_ID: ${{ secrets.EMAIL_ID }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python generate_story.py

      - name: Commit and Push Story Archive
        run: |
          git config --global user.name "Kathani-Agent"
          git config --global user.email "kathani@actions.github.com"
          git add stories/ today_genre.json
          git commit -m "chore(story): add daily tale and update genre tracker" || echo "No changes to commit"
          git push
